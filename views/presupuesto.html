<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Presupuesto</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <nav>
        <a href="../index.html">Inicio</a>
        <a href="galeria.html">Galería</a>
        <a href="presupuesto.html" class="activo">Presupuesto</a>
        <a href="contacto.html">Contacto</a>
    </nav>
    <main>
        <h1>Calcula tu presupuesto</h1>
        <form id="form-presupuesto">
            <fieldset class="espaciado">
                <legend>Datos de Contacto</legend>
                <label class="elemento-bloque">Nombre: 
                    <input type="text" id="nombre" maxlength="15" pattern="[a-zA-ZáéíóúÁÉÍÓÚñÑ\s]+" required>
                </label>
                <label class="elemento-bloque">Apellidos: 
                    <input type="text" id="apellidos" maxlength="40" pattern="[a-zA-ZáéíóúÁÉÍÓÚñÑ\s]+" required>
                </label>
                <label class="elemento-bloque">Teléfono: 
                    <input type="text" id="telefono" maxlength="9" pattern="[0-9]{9}" required>
                </label>
                <label class="elemento-bloque">Correo: 
                    <input type="email" id="correo" required>
                </label>
            </fieldset>

            <fieldset class="espaciado">
                <legend>Configura tu Servicio</legend>
                
                <label class="elemento-bloque">Elige un Producto:
                    <select id="producto">
                        <option value="0">Selecciona una opción...</option>
                        <option value="300">Página Web Básica (300€)</option>
                        <option value="600">Página Web Avanzada (600€)</option>
                        <option value="1200">Tienda Online (1200€)</option>
                    </select>
                </label>

                <div class="espaciado">
                    <p>Extras:</p>
                    <label class="elemento-bloque"><input type="checkbox" class="extra" value="100"> Mantenimiento Anual (+100€)</label>
                    <label class="elemento-bloque"><input type="checkbox" class="extra" value="200"> Posicionamiento SEO (+200€)</label>
                    <label class="elemento-bloque"><input type="checkbox" class="extra" value="50"> Logotipo (+50€)</label>
                </div>

                <label class="elemento-bloque">Plazo de entrega en meses (10% descuento desde 3 meses): 
                    <input type="number" id="plazo" value="1" min="1">
                </label>

                <h3 class="espaciado">Presupuesto estimado: <span id="total-precio">0</span>€</h3>

                <label class="elemento-bloque">
                    <input type="checkbox" id="condiciones" required> Acepto las condiciones de privacidad.
                </label>
            </fieldset>

            <button type="submit">Enviar Presupuesto</button>
            <button type="reset">Resetear</button>
        </form>
    </main>
    <footer>
        <div class="footer-logos">
            <a href="https://instagram.com" target="_blank"><img src="../assets/icons/instagram.png" width="30" height="30" alt="Instagram"></a>
            <a href="https://twitter.com" target="_blank"><img src="../assets/icons/twitter.png" width="30" height="30" alt="Twitter"></a>
        </div>
        <p>Aviso Legal | Dirección: Calle Principal 123, Palma</p>
        <p>&copy; 2026 Fran Motta</p>
    </footer>
    <script src="../js/presupuesto.js"></script>
</body>
</html>
